version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: styleai-api
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Mount Firebase service account as read-only secret
      - ./backend/fashion-ai-app-33369-firebase-adminsdk-fbsvc-d5c4da0c1d.json:/app/firebase-service-account.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
