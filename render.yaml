services:
  - type: web
    name: drapeai-landing
    runtime: static
    buildCommand: cd landing && npm install && npm run build
    staticPublishPath: landing/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://drapeai-wnum.onrender.com
      - key: VITE_GA4_ID
        sync: false
      - key: VITE_CLARITY_ID
        sync: false

  - type: web
    name: styleai-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB_NAME
        value: styleai
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_TOKEN
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: 43200
      - key: FIREBASE_CREDENTIALS_PATH
        value: ./firebase-service-account.json
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEBUG
        value: false
